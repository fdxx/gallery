<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@6.1.14/dist/fancybox/fancybox.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <nav class="navbar">
      <a href="/index.html">Gallery</a>
## for crumb in navbar
      <span class="sep">/</span>
      <a href="{{ crumb.url }}">{{ crumb.name }}</a>
## endfor
    </nav>
    <h1>{{ title }}</h1>
    <span class="photo-count">{{ count }} 张照片</span>
  </header>
  <main>
    <div class="photo-container" style="position:relative; height:{{ container_height }}px;">
## for photo in photos
      <a href="{{ photo.src }}" class="photo-link" data-fancybox="gallery"
        style="position:absolute; top:{{ photo.top }}px; left:{{ photo.left }}px; width:{{ photo.width }}px; height:{{ photo.height }}px;">
        <img src="{{ photo.src }}" alt="{{ photo.name }}" loading="lazy" style="width:100%; height:100%; object-fit:cover; display:block;">
      </a>
## endfor
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@6.1.14/dist/fancybox/fancybox.umd.js"></script>
  <script>
  Fancybox.bind('[data-fancybox]', {
    placeFocusBack: false,
    Hash: false,
    Carousel: {
      Thumbs: false,
      Toolbar: {
        display: {
          middle: [
            "zoomIn",
            "zoomOut",
            "toggle1to1",
            "rotateCCW",
            "rotateCW",
            "flipX",
            "flipY",
          ],
        },
      },
    }
  });
  </script>
</body>
</html>
